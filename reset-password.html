<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BA.IA — SS · Reimposta Password</title>
<meta name="description" content="Reimposta la password del tuo account BA.IA — SS.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 24px 60px;position:relative;z-index:2}
.baia-card{width:100%;max-width:460px;background:var(--glass);backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;position:relative;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.6);text-align:center}
.baia-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,142,255,.04),rgba(0,212,255,.03));pointer-events:none}
.baia-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);opacity:.7}
.baia-card > *{position:relative;z-index:1}
.baia-card h1{font-family:var(--ff-d);font-size:30px;font-weight:400;letter-spacing:-.02em;line-height:1.15;color:var(--text);margin:0 0 10px}
.baia-card .sub{font-size:14px;color:var(--text2);line-height:1.65;margin:0 0 20px}
.state-icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:32px}
.icon-key{background:rgba(74,142,255,.1);border:1px solid rgba(74,142,255,.25);color:var(--blue);box-shadow:0 0 60px rgba(74,142,255,.15)}
.icon-error{background:rgba(255,107,157,.1);border:1px solid rgba(255,107,157,.3);color:#FF6B9D;box-shadow:0 0 60px rgba(255,107,157,.15)}
.input-wrap{position:relative}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.6;transition:opacity .2s;padding:4px}
.eye-btn:hover{opacity:1}
.strength-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;background:#ef4444;transition:all .3s;border-radius:2px}
.msg{display:none;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.55;margin-bottom:16px;text-align:left;border:1px solid}
.msg.error{background:rgba(255,107,157,.06);border-color:rgba(255,107,157,.3);color:#FFB8CE}
.msg.success{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.25);color:var(--green)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<nav class="baia-nav" id="baia-nav"><div class="nav-inner"><a class="nav-logo" href="index.html"><div class="logo-mark"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#0A1428"/><rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="rgba(74,142,255,0.35)"/><path d="M10 9h8.5c2.8 0 4.5 1.5 4.5 3.8 0 1.4-.7 2.5-1.8 3.2 1.6.6 2.8 1.9 2.8 3.8 0 2.7-2 4.2-5.2 4.2H10V9z" fill="#4A8EFF" opacity="0.9"/><path d="M13 12h5c1 0 1.8.7 1.8 1.8s-.8 1.8-1.8 1.8h-5v-3.6z" fill="#04080F"/><path d="M13 17h5.5c1.2 0 2 .8 2 2s-.8 2-2 2H13v-4z" fill="#04080F"/><circle cx="27" cy="13" r="1.5" fill="#00D4FF" opacity="0.9"/><circle cx="27" cy="19" r="1.5" fill="#7B5CF0" opacity="0.7"/><circle cx="27" cy="25" r="1.5" fill="#4A8EFF" opacity="0.5"/></svg></div><span class="logo-wordmark">BA<span>.</span>IA</span><span class="logo-ss-tag">SS</span></a><div class="nav-pill"><a href="login.html" class="btn btn-ghost">Accedi</a><a href="signup.html" class="btn-cta-nav"><span>Inizia gratis</span><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div></div></nav>
<script>
window.addEventListener('scroll',()=>{var n=document.getElementById('baia-nav');if(n)n.classList.toggle('scrolled',scrollY>20)},{passive:true});
</script>

<div class="center-wrap">
  <div class="baia-card">

    <div id="stateForm">
      <div class="state-icon icon-key">🔑</div>
      <h1>Nuova password</h1>
      <p class="sub">Scegli una password sicura per proteggere il tuo account.</p>
      <div id="msgBox" class="msg"></div>
      <div class="form-group" style="text-align:left">
        <label class="form-label">Nuova password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="pass1" placeholder="Minimo 8 caratteri" oninput="checkStr()" style="padding-right:40px">
          <button class="eye-btn" onclick="toggleEye('pass1',this)" type="button">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="sf" style="width:0%"></div></div>
      </div>
      <div class="form-group" style="text-align:left">
        <label class="form-label">Ripeti password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="pass2" placeholder="Ripeti la password" onkeydown="if(event.key==='Enter')doReset()" style="padding-right:40px">
          <button class="eye-btn" onclick="toggleEye('pass2',this)" type="button">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg btn-block" id="resetBtn" onclick="doReset()"><span>✓ Imposta nuova password</span></button>
      <p style="text-align:center;margin-top:14px;font-size:12.5px;color:var(--text3)"><a href="login.html" style="color:var(--cyan)">← Torna al login</a></p>
    </div>

    <div id="stateInvalid" style="display:none">
      <div class="state-icon icon-error">❌</div>
      <h1>Link scaduto</h1>
      <p class="sub">Il link per reimpostare la password è scaduto o non è valido.</p>
      <a href="login.html" class="btn btn-primary btn-lg btn-block">→ Torna al login</a>
    </div>

  </div>
</div>
<div id="notify"></div>

<script>
'use strict';
const SUPABASE_URL  = 'https://gtrjepxrnvptkqpezvba.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0cmplcHhybnZwdGtxcGV6dmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTE3MjcsImV4cCI6MjA5MDUyNzcyN30.9q2BkcZfe_Z9O1eI_HU3n7Y43acQg0KFmrRGxq-6sxk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function notify(msg, type) {
  type = type || 'info';
  var wrap = document.getElementById('notify'); if (!wrap) return;
  var el = document.createElement('div');
  el.className = 'notify-item notify-' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; }, 4000);
  setTimeout(function(){ el.remove(); }, 4300);
}

function showMsg(txt,type){ const el=document.getElementById('msgBox'); el.textContent=txt; el.className='msg '+type; el.style.display='block'; }
function toggleEye(id,btn){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='password'?'👁':'🙈'; }
function checkStr(){ const pw=document.getElementById('pass1').value; let s=0;
  if(pw.length>=8)s++; if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  const f=document.getElementById('sf'); f.style.width=(s*25)+'%';
  f.style.background=['#ef4444','#f59e0b','#3b82f6','#00E5A0'][s-1]||'#ef4444';
}
(async()=>{
  const hash=new URLSearchParams(window.location.hash.replace('#','?'));
  const token=hash.get('access_token'); const type=hash.get('type');
  if(token&&type==='recovery'){
    const{error}=await sb.auth.setSession({access_token:token,refresh_token:hash.get('refresh_token')||''});
    if(error){ document.getElementById('stateForm').style.display='none'; document.getElementById('stateInvalid').style.display=''; }
    return;
  }
  const{data}=await sb.auth.getSession();
  if(!data||!data.session){ document.getElementById('stateForm').style.display='none'; document.getElementById('stateInvalid').style.display=''; }
})();
async function doReset(){
  const p1=document.getElementById('pass1').value;
  const p2=document.getElementById('pass2').value;
  if(!p1||!p2){showMsg('Compila entrambi i campi','error');return;}
  if(p1.length<8){showMsg('La password deve avere almeno 8 caratteri','error');return;}
  if(p1!==p2){showMsg('Le password non corrispondono','error');return;}
  const btn=document.getElementById('resetBtn'); btn.disabled=true; btn.innerHTML='<span>⏳ Aggiornamento…</span>';
  try{
    const{error}=await sb.auth.updateUser({password:p1});
    if(error) throw error;
    showMsg('✅ Password aggiornata! Reindirizzamento…','success');
    setTimeout(()=>window.location.href='BAIA-SS.html',1800);
  }catch(e){
    showMsg('❌ '+(e.message||'Errore'),'error');
    btn.disabled=false; btn.innerHTML='<span>✓ Imposta nuova password</span>';
  }
}
</script>
</body>
</html>
