<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BA.IA — SS · Registrati</title>
<meta name="description" content="Crea il tuo account gratuito BA.IA — SS. 14 giorni trial Pro, nessuna carta richiesta.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.auth-card{max-width:500px}
.auth-card h2{font-family:var(--ff-d);font-size:32px;font-weight:400;letter-spacing:-.02em;line-height:1.1;color:var(--text);margin:12px 0 6px;text-align:center}
.auth-card .auth-header p{font-size:13px;color:var(--text3);text-align:center;margin:0 0 22px;line-height:1.55}
.auth-card .auth-logo{justify-content:center;margin-bottom:10px}
.trial-badge{display:inline-block;font-family:var(--ff-m);font-size:10.5px;letter-spacing:.14em;color:var(--green);background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.25);padding:5px 12px;border-radius:100px;margin-bottom:8px}
.auth-card .auth-header{text-align:center}
.msg{display:none;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.55;margin-bottom:16px;border:1px solid}
.msg.error{background:rgba(255,107,157,.06);border-color:rgba(255,107,157,.3);color:#FFB8CE}
.msg.success{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.25);color:var(--green)}
.input-wrap{position:relative}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.6;padding:4px;transition:opacity .2s}
.eye-btn:hover{opacity:1}
.strength-wrap{margin-top:8px}
.strength-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.strength-fill{height:100%;background:#ef4444;transition:all .3s;border-radius:2px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:#fff;color:#1a1a1a;font-family:var(--ff-b);font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s}
.google-btn:hover{background:#f3f4f6;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.form-footer{text-align:center;margin-top:18px;font-size:13px;color:var(--text3)}
.form-footer a{color:var(--cyan);border-bottom:1px solid rgba(0,212,255,.25);transition:all .2s}
.form-footer a:hover{color:var(--blue);border-bottom-color:var(--blue)}
.terms-note{text-align:center;font-size:11.5px;color:var(--text3);margin-top:14px;line-height:1.55}
.terms-note a{color:var(--cyan);transition:color .2s}
.terms-note a:hover{color:var(--blue)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<nav class="baia-nav" id="baia-nav"><div class="nav-inner"><a class="nav-logo" href="index.html"><div class="logo-mark"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#0A1428"/><rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="rgba(74,142,255,0.35)"/><path d="M10 9h8.5c2.8 0 4.5 1.5 4.5 3.8 0 1.4-.7 2.5-1.8 3.2 1.6.6 2.8 1.9 2.8 3.8 0 2.7-2 4.2-5.2 4.2H10V9z" fill="#4A8EFF" opacity="0.9"/><path d="M13 12h5c1 0 1.8.7 1.8 1.8s-.8 1.8-1.8 1.8h-5v-3.6z" fill="#04080F"/><path d="M13 17h5.5c1.2 0 2 .8 2 2s-.8 2-2 2H13v-4z" fill="#04080F"/><circle cx="27" cy="13" r="1.5" fill="#00D4FF" opacity="0.9"/><circle cx="27" cy="19" r="1.5" fill="#7B5CF0" opacity="0.7"/><circle cx="27" cy="25" r="1.5" fill="#4A8EFF" opacity="0.5"/></svg></div><span class="logo-wordmark">BA<span>.</span>IA</span><span class="logo-ss-tag">SS</span></a><div class="nav-pill"><a href="login.html" class="btn btn-ghost">Accedi</a></div></div></nav>
<script>
window.addEventListener('scroll',()=>{var n=document.getElementById('baia-nav');if(n)n.classList.toggle('scrolled',scrollY>20)},{passive:true});
</script>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="logo-mark"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#0A1428"/><rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="rgba(74,142,255,0.35)"/><path d="M10 9h8.5c2.8 0 4.5 1.5 4.5 3.8 0 1.4-.7 2.5-1.8 3.2 1.6.6 2.8 1.9 2.8 3.8 0 2.7-2 4.2-5.2 4.2H10V9z" fill="#4A8EFF" opacity="0.9"/><path d="M13 12h5c1 0 1.8.7 1.8 1.8s-.8 1.8-1.8 1.8h-5v-3.6z" fill="#04080F"/><path d="M13 17h5.5c1.2 0 2 .8 2 2s-.8 2-2 2H13v-4z" fill="#04080F"/><circle cx="27" cy="13" r="1.5" fill="#00D4FF" opacity="0.9"/><circle cx="27" cy="19" r="1.5" fill="#7B5CF0" opacity="0.7"/><circle cx="27" cy="25" r="1.5" fill="#4A8EFF" opacity="0.5"/></svg></div>
        <span class="logo-wordmark">BA<span>.</span>IA</span>
        <span class="logo-ss-tag">SS</span>
      </div>
      <div class="trial-badge">✨ 14 GIORNI GRATIS</div>
      <h2>Crea il tuo <em>account</em></h2>
      <p>Nessuna carta richiesta · cancelli quando vuoi</p>
    </div>
    <div class="auth-body">
      <div id="msgBox" class="msg"></div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome <span style="color:#FF6B9D">*</span></label>
          <input class="form-input" type="text" id="regNome" placeholder="Mario" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label">Cognome <span style="color:#FF6B9D">*</span></label>
          <input class="form-input" type="text" id="regCognome" placeholder="Rossi" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span style="color:#FF6B9D">*</span></label>
        <input class="form-input" type="email" id="regEmail" placeholder="mario@studio.it" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Nome Studio / Azienda</label>
        <input class="form-input" type="text" id="regAzienda" placeholder="Studio Ferrari Srl" autocomplete="organization">
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:#FF6B9D">*</span></label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="regPwd" placeholder="Min. 8 caratteri" autocomplete="new-password" oninput="checkStrength()" style="padding-right:40px">
          <button class="eye-btn" onclick="toggleEye('regPwd',this)" type="button">👁</button>
        </div>
        <div class="strength-wrap"><div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div></div>
      </div>
      <div class="form-group">
        <label class="form-label">Ripeti password <span style="color:#FF6B9D">*</span></label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="regPwd2" placeholder="Ripeti la password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()" style="padding-right:40px">
          <button class="eye-btn" onclick="toggleEye('regPwd2',this)" type="button">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-block" id="signupBtn" onclick="doSignup()" style="margin-top:4px;">
        <span>✓ Crea Account Gratuito</span>
      </button>

      <div class="divider">oppure</div>
      <button class="google-btn" onclick="googleSignup()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continua con Google
      </button>
      <div class="form-footer">Hai già un account? <a href="login.html">Accedi →</a></div>
      <p class="terms-note">Registrandoti accetti i <a href="terms.html">Termini di Servizio</a> e la <a href="privacy.html">Privacy Policy</a>.</p>
    </div>
  </div>
</div>

<div id="notify"></div>
<script>
'use strict';
const SUPABASE_URL  = 'https://gtrjepxrnvptkqpezvba.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0cmplcHhybnZwdGtxcGV6dmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTE3MjcsImV4cCI6MjA5MDUyNzcyN30.9q2BkcZfe_Z9O1eI_HU3n7Y43acQg0KFmrRGxq-6sxk';
const APP = 'BAIA-SS.html';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function notify(msg, type){
  type = type || 'info';
  var wrap = document.getElementById('notify'); if (!wrap) return;
  var el = document.createElement('div');
  el.className = 'notify-item notify-' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; }, 4000);
  setTimeout(function(){ el.remove(); }, 4300);
}
function showMsg(txt, type) {
  const el = document.getElementById('msgBox');
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
  el.scrollIntoView({ block: 'nearest' });
}
function toggleEye(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
function checkStrength() {
  const pw = document.getElementById('regPwd').value;
  let s = 0;
  if (pw.length >= 8) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const fill = document.getElementById('strengthFill');
  fill.style.width = (s * 25) + '%';
  fill.style.background = ['#ef4444','#f59e0b','#3b82f6','#00E5A0'][s-1] || '#ef4444';
}
function et(msg) {
  if (!msg) return 'Errore sconosciuto';
  if (msg.includes('already registered')) return '⚠️ Email già registrata — vai al login.';
  if (msg.includes('Password')) return '⚠️ Password troppo corta (min. 8 caratteri).';
  return msg;
}
async function doSignup() {
  const nome    = document.getElementById('regNome').value.trim();
  const cognome = document.getElementById('regCognome').value.trim();
  const email   = document.getElementById('regEmail').value.trim();
  const azienda = document.getElementById('regAzienda').value.trim();
  const pwd     = document.getElementById('regPwd').value;
  const pwd2    = document.getElementById('regPwd2').value;
  if (!nome || !cognome || !email || !pwd) { showMsg('Compila tutti i campi obbligatori (*).', 'error'); return; }
  if (pwd.length < 8) { showMsg('La password deve avere almeno 8 caratteri.', 'error'); return; }
  if (pwd !== pwd2)   { showMsg('Le password non coincidono.', 'error'); return; }
  const btn = document.getElementById('signupBtn'); btn.disabled = true; btn.innerHTML = '<span>⏳ Registrazione…</span>';
  try {
    const { data, error } = await sb.auth.signUp({
      email, password: pwd,
      options: { data: { nome, cognome, full_name: nome+' '+cognome, nome_azienda: azienda }, emailRedirectTo: window.location.origin+'/confirm-email.html' }
    });
    if (error) throw error;
    if (data && data.user && data.user.identities && data.user.identities.length === 0) {
      showMsg('⚠️ Email già registrata. Vai al login.', 'error');
      btn.disabled=false; btn.innerHTML='<span>✓ Crea Account Gratuito</span>';
      return;
    }
    sessionStorage.setItem('baia_signup_email', email);
    window.location.href = 'confirm-email.html';
  } catch(e) {
    showMsg('❌ ' + et(e.message), 'error');
    btn.disabled = false; btn.innerHTML = '<span>✓ Crea Account Gratuito</span>';
  }
}
async function googleSignup() {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin+'/'+APP } });
  if (error) showMsg('❌ ' + error.message, 'error');
}
(async () => { const { data } = await sb.auth.getSession(); if (data && data.session) window.location.href = APP; })();
</script>
</body>
</html>
