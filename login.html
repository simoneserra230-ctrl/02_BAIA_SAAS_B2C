<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BA.IA — SS · Accedi</title>
<meta name="description" content="Accedi a BA.IA — SS, la piattaforma AI per l'analisi bandi di finanza agevolata.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.auth-card h2{font-family:var(--ff-d);font-size:32px;font-weight:400;letter-spacing:-.02em;line-height:1.1;color:var(--text);margin:12px 0 6px;text-align:center}
.auth-card .auth-header p{font-size:13px;color:var(--text3);text-align:center;margin:0 0 22px;line-height:1.55}
.auth-card .auth-logo{justify-content:center;margin-bottom:6px}
.auth-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px 10px;font-family:var(--ff-b);font-size:12.5px;font-weight:600;color:var(--text3);background:transparent;border:none;border-radius:7px;cursor:pointer;transition:all .2s}
.auth-tab:hover{color:var(--text2)}
.auth-tab.active{background:rgba(74,142,255,.08);color:var(--text);border:1px solid rgba(74,142,255,.2)}
.msg{display:none;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.55;margin-bottom:16px;border:1px solid}
.msg.error{background:rgba(255,107,157,.06);border-color:rgba(255,107,157,.3);color:#FFB8CE}
.msg.success{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.25);color:var(--green)}
.msg.info{background:rgba(74,142,255,.06);border-color:rgba(74,142,255,.25);color:var(--text)}
.input-wrap{position:relative}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.6;padding:4px;transition:opacity .2s}
.eye-btn:hover{opacity:1}
.forgot-link{display:block;text-align:right;font-size:12.5px;color:var(--cyan);margin-bottom:16px;transition:color .2s}
.forgot-link:hover{color:var(--blue)}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:#fff;color:#1a1a1a;font-family:var(--ff-b);font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s}
.google-btn:hover{background:#f3f4f6;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.form-footer{text-align:center;margin-top:18px;font-size:13px;color:var(--text3)}
.form-footer a{color:var(--cyan);border-bottom:1px solid rgba(0,212,255,.25);transition:all .2s}
.form-footer a:hover{color:var(--blue);border-bottom-color:var(--blue)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<nav class="baia-nav" id="baia-nav"><div class="nav-inner"><a class="nav-logo" href="index.html"><div class="logo-mark"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#0A1428"/><rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="rgba(74,142,255,0.35)"/><path d="M10 9h8.5c2.8 0 4.5 1.5 4.5 3.8 0 1.4-.7 2.5-1.8 3.2 1.6.6 2.8 1.9 2.8 3.8 0 2.7-2 4.2-5.2 4.2H10V9z" fill="#4A8EFF" opacity="0.9"/><path d="M13 12h5c1 0 1.8.7 1.8 1.8s-.8 1.8-1.8 1.8h-5v-3.6z" fill="#04080F"/><path d="M13 17h5.5c1.2 0 2 .8 2 2s-.8 2-2 2H13v-4z" fill="#04080F"/><circle cx="27" cy="13" r="1.5" fill="#00D4FF" opacity="0.9"/><circle cx="27" cy="19" r="1.5" fill="#7B5CF0" opacity="0.7"/><circle cx="27" cy="25" r="1.5" fill="#4A8EFF" opacity="0.5"/></svg></div><span class="logo-wordmark">BA<span>.</span>IA</span><span class="logo-ss-tag">SS</span></a><div class="nav-pill"><a href="signup.html" class="btn-cta-nav"><span>Inizia gratis</span><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div></div></nav>
<script>
window.addEventListener('scroll',()=>{var n=document.getElementById('baia-nav');if(n)n.classList.toggle('scrolled',scrollY>20)},{passive:true});
</script>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="logo-mark"><svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#0A1428"/><rect x="0.5" y="0.5" width="35" height="35" rx="9.5" stroke="rgba(74,142,255,0.35)"/><path d="M10 9h8.5c2.8 0 4.5 1.5 4.5 3.8 0 1.4-.7 2.5-1.8 3.2 1.6.6 2.8 1.9 2.8 3.8 0 2.7-2 4.2-5.2 4.2H10V9z" fill="#4A8EFF" opacity="0.9"/><path d="M13 12h5c1 0 1.8.7 1.8 1.8s-.8 1.8-1.8 1.8h-5v-3.6z" fill="#04080F"/><path d="M13 17h5.5c1.2 0 2 .8 2 2s-.8 2-2 2H13v-4z" fill="#04080F"/><circle cx="27" cy="13" r="1.5" fill="#00D4FF" opacity="0.9"/><circle cx="27" cy="19" r="1.5" fill="#7B5CF0" opacity="0.7"/><circle cx="27" cy="25" r="1.5" fill="#4A8EFF" opacity="0.5"/></svg></div>
        <span class="logo-wordmark">BA<span>.</span>IA</span>
        <span class="logo-ss-tag">SS</span>
      </div>
      <h2>Bentornato</h2>
      <p>Analisi AI per la finanza agevolata italiana</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Accedi</button>
        <button class="auth-tab" id="tabForgot" onclick="switchTab('forgot')">Password dimenticata</button>
      </div>

      <div id="msgBox" class="msg"></div>

      <div id="formLogin">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="la-tua@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:40px">
            <button class="eye-btn" onclick="toggleEye('loginPassword',this)" type="button">👁</button>
          </div>
        </div>
        <a class="forgot-link" href="#" onclick="switchTab('forgot');return false;">Password dimenticata?</a>
        <button class="btn btn-primary btn-lg btn-block" id="loginBtn" onclick="doLogin()">
          <span>→ Accedi</span>
        </button>
        <div class="divider">oppure</div>
        <button class="google-btn" onclick="googleLogin()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continua con Google
        </button>
        <div class="form-footer">Non hai un account? <a href="signup.html">Registrati gratis →</a></div>
      </div>

      <div id="formForgot" style="display:none">
        <p style="font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;">Inserisci la tua email e ti invieremo un link per reimpostare la password.</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="forgotEmail" placeholder="la-tua@email.com" onkeydown="if(event.key==='Enter')doForgot()">
        </div>
        <button class="btn btn-primary btn-lg btn-block" onclick="doForgot()"><span>📧 Invia link di reset</span></button>
        <div class="form-footer" style="margin-top:14px;"><a href="#" onclick="switchTab('login');return false;">← Torna al login</a></div>
      </div>
    </div>
  </div>
</div>

<div id="notify"></div>

<script>
'use strict';
const SUPABASE_URL  = 'https://gtrjepxrnvptkqpezvba.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0cmplcHhybnZwdGtxcGV6dmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTE3MjcsImV4cCI6MjA5MDUyNzcyN30.9q2BkcZfe_Z9O1eI_HU3n7Y43acQg0KFmrRGxq-6sxk';
const APP = 'BAIA-SS.html';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function notify(msg, type){
  type = type || 'info';
  var wrap = document.getElementById('notify'); if (!wrap) return;
  var el = document.createElement('div');
  el.className = 'notify-item notify-' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; }, 4000);
  setTimeout(function(){ el.remove(); }, 4300);
}

function showMsg(txt, type) {
  const el = document.getElementById('msgBox');
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
}
function switchTab(t) {
  document.getElementById('formLogin').style.display  = t === 'login'  ? '' : 'none';
  document.getElementById('formForgot').style.display = t === 'forgot' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', t === 'login');
  document.getElementById('tabForgot').classList.toggle('active', t === 'forgot');
  document.getElementById('msgBox').style.display = 'none';
}
function toggleEye(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPassword').value;
  if (!email || !pwd) { showMsg('Inserisci email e password', 'error'); return; }
  const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.innerHTML = '<span>⏳ Accesso in corso…</span>';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) throw error;
    window.location.href = APP;
  } catch(e) {
    showMsg('❌ ' + (e.message || 'Credenziali non valide'), 'error');
    btn.disabled = false; btn.innerHTML = '<span>→ Accedi</span>';
  }
}
async function googleLogin() {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/' + APP } });
  if (error) showMsg('❌ ' + error.message, 'error');
}
async function doForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showMsg('Inserisci la tua email', 'error'); return; }
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password.html' });
    if (error) throw error;
    showMsg('✅ Email inviata! Controlla la casella.', 'success');
  } catch(e) { showMsg('❌ ' + e.message, 'error'); }
}
(async () => { const { data } = await sb.auth.getSession(); if (data && data.session) window.location.href = APP; })();
</script>
</body>
</html>
